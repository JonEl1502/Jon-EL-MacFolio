server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # nginx's default mime.types is missing .mjs; without this, ES module
    # workers (pdfjs / react-pdf's pdf.worker.min.mjs) get served as
    # application/octet-stream and the browser refuses to execute them.
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/svg+xml                         svg svgz;
        image/webp                            webp;
        image/x-icon                          ico;
        application/pdf                       pdf;
        font/woff                             woff;
        font/woff2                            woff2;
        application/font-woff                 woff;
        application/font-woff2                woff2;
        font/ttf                              ttf;
        text/plain                            txt;
        application/xml                       xml;
        application/manifest+json             webmanifest;
    }
    default_type application/octet-stream;

    # gzip is fine here; Caddy in front also handles encode gzip.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml font/woff font/woff2;

    # Long-cache fingerprinted Vite assets.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Static media (images, files, icons) — moderate cache, served from public/.
    location ~* \.(?:png|jpg|jpeg|gif|svg|webp|ico|pdf|woff2?|ttf)$ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html, which must never be cached.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
