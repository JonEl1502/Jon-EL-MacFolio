name: kabiu-john

services:
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    networks:
      web:
        aliases:
          - kabiu-john-web

networks:
  web:
    external: true
